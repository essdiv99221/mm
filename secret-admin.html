<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>دخول المدير (مخفي)</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .secret-container{max-width:420px;margin:6rem auto;padding:1.6rem;background:var(--card);border-radius:8px}
    .secret-container h2{margin-bottom:0.6rem}
  </style>
</head>
<body>
  <main>
    <div class="secret-container">
      <h2>دخول المدير (مخفي)</h2>
      <form id="secret-admin-form">
        <div class="form-row"><label>البريد</label><input name="email" type="email" required></div>
        <div class="form-row"><label>كلمة المرور</label><input name="password" type="password" required></div>
        <div style="margin-top:0.8rem"><button class="btn btn-primary" type="submit">دخول</button></div>
      </form>
      <p style="margin-top:0.8rem;color:var(--text-soft);font-size:0.9rem">صفحة مخفية — لا تضف رابط لهذه الصفحة في القائمة.</p>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
