<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahdypaperus | فاتورة</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-loaded">
  <main>
    <section class="section-panel invoice-panel">
      <div id="invoice-content"></div>
      <div style="margin-top:1rem; display:flex; gap:0.6rem;">
        <button id="print-invoice" class="btn btn-primary">طباعة الفاتورة</button>
        <a id="download-pdf" class="btn btn-secondary" href="#">تحميل PDF (طباعة)</a>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
  <script>
    document.getElementById('print-invoice').addEventListener('click', () => window.print());
  </script>
</body>
</html>
